name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'kinder-site/**'
      - '.github/workflows/deploy-site.yml'
  pull_request:
    branches: [main]
    paths:
      - 'kinder-site/**'
      - '.github/workflows/deploy-site.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build and upload site artifact
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6.1.1
        with:
          path: kinder-site
          node-version: '22'

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    # Deploy on push-to-main and on manual workflow_dispatch runs.
    # Pull requests build (preview) but do not deploy.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
