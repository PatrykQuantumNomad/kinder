name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # Required for GitHub Release creation and asset upload

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # REQUIRED: full history needed for GoReleaser changelog generation. DO NOT change to fetch-depth: 1.
          fetch-depth: 0

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: .go-version   # Reads the pinned Go version from .go-version

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}  # PAT with Contents:write on homebrew-kinder repo
